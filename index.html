<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"; // 建議使用穩定版版號
    import { getDatabase, ref, push, onChildAdded, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // 這裡請確保你的 Firebase Config 是正確的
    const firebaseConfig = {
        apiKey: "AIzaSyDojQA5hs0LCdCilfqkTX-vDoo-c91Dc8A",
        authDomain: "my-realtime-demo.firebaseapp.com",
        databaseURL: "https://my-realtime-demo-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "my-realtime-demo",
        storageBucket: "my-realtime-demo.firebasestorage.app",
        messagingSenderId: "777385925855",
        appId: "1:777385925855:web:5d0e42f7e7581538491d6a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const wallRef = ref(db, 'workshop_ideas');

    let currentStep = 1;
    const stageLabels = ["看見問題", "提煉價值", "設計活動", "評估可行性"];

    // 確保 onclick 可以抓到函式
    window.changeStep = function(n) {
        const newStep = currentStep + n;
        if (newStep < 1 || newStep > 4) return;
        
        // 切換顯示
        document.getElementById(`step${currentStep}`).classList.remove('active');
        document.querySelector(`.step[data-step="${currentStep}"]`).classList.remove('active');
        
        currentStep = newStep;
        
        document.getElementById(`step${currentStep}`).classList.add('active');
        document.querySelector(`.step[data-step="${currentStep}"]`).classList.add('active');

        // 按鈕顯示邏輯
        document.getElementById('prevBtn').style.visibility = (currentStep === 1) ? 'hidden' : 'visible';
        
        if (currentStep === 4) {
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('submitBtn').style.display = 'block';
        } else {
            document.getElementById('nextBtn').style.display = 'block';
            document.getElementById('submitBtn').style.display = 'none';
        }
    };

    window.submitData = function() {
        const group = document.getElementById('userGroup').value.trim() || "未分組";
        const name = document.getElementById('userName').value.trim() || "匿名島民";
        const role = document.getElementById('userRole').value;
        const content = document.getElementById(`ans${currentStep}`).value.trim();

        if (!content) {
            alert("請輸入內容再送出喔！");
            return;
        }

        // 停用按鈕防止重複點擊
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "傳送中...";

        push(wallRef, {
            group, name, role,
            stage: stageLabels[currentStep-1],
            content,
            timestamp: serverTimestamp() // 使用伺服器時間更準確
        }).then(() => {
            alert("同步成功！您可以繼續修改或填寫其他想法。");
            document.getElementById(`ans${currentStep}`).value = ""; // 清空
            btn.disabled = false;
            btn.innerText = "送出答案";
        }).catch((error) => {
            console.error(error);
            alert("傳送失敗，請檢查網路連線。");
            btn.disabled = false;
        });
    };

    // 監聽新資料
    onChildAdded(wallRef, (data) => {
        const idea = data.val();
        const wallGrid = document.getElementById('wallGrid');
        const card = document.createElement('div');
        card.className = 'idea-card';
        card.innerHTML = `
            <div class="card-meta">
                <span><strong>${idea.group}</strong> · ${idea.name} (${idea.role})</span>
                <span class="card-tag">${idea.stage}</span>
            </div>
            <div class="card-content">${idea.content}</div>
        `;
        // 最新的卡片放在最前面
        wallGrid.prepend(card);
    });
</script>
