<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>外木山工作坊即時互動頁面</title>
    <style>
        :root {
            --ocean-blue: #005B96;
            --nature-green: #4F7942;
            --beach-white: #F8F9FA;
            --text-dark: #333;
            --shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; }
        body { background-color: var(--beach-white); color: var(--text-dark); line-height: 1.6; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; color: var(--ocean-blue); }
        .input-card { background: #fff; padding: 30px; border-radius: 15px; box-shadow: var(--shadow); margin-bottom: 40px; border-top: 5px solid var(--ocean-blue); }
        .user-info { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; color: var(--ocean-blue); }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
        .progress-stepper { display: flex; justify-content: space-between; margin-bottom: 30px; position: relative; }
        .progress-stepper::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 2px; background: #eee; z-index: 1; transform: translateY(-50%); }
        .step { width: 40px; height: 40px; background: #fff; border: 2px solid #eee; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 2; font-weight: bold; transition: 0.3s; }
        .step.active { border-color: var(--ocean-blue); background: var(--ocean-blue); color: white; }
        .question-card { display: none; animation: fadeIn 0.5s ease; }
        .question-card.active { display: block; }
        .helper-text { font-size: 0.9rem; color: #666; margin-bottom: 15px; font-style: italic; }
        .btn-group { display: flex; justify-content: space-between; margin-top: 20px; }
        button { padding: 10px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-prev { background: #eee; color: #666; }
        .btn-next { background: var(--ocean-blue); color: white; }
        .btn-submit { background: var(--nature-green); color: white; }
        .wall-section h2 { text-align: center; margin-bottom: 20px; color: var(--ocean-blue); border-bottom: 2px solid var(--ocean-blue); padding-bottom: 10px; }
        .wall-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .idea-card { background: white; padding: 20px; border-radius: 12px; box-shadow: var(--shadow); border-left: 5px solid var(--nature-green); animation: slideUp 0.4s ease; }
        .card-meta { display: flex; justify-content: space-between; font-size: 0.85rem; color: #888; margin-bottom: 10px; }
        .card-tag { background: var(--ocean-blue); color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <header><h1>外木山工作坊：即時共創互動</h1></header>

    <section class="input-card">
        <div class="user-info">
            <div class="form-group"><label>組別</label><input type="text" id="userGroup" placeholder="例如：第一組"></div>
            <div class="form-group"><label>暱稱</label><input type="text" id="userName" placeholder="如何稱呼您？"></div>
            <div class="form-group"><label>角色</label>
                <select id="userRole">
                    <option value="學生">學生</option>
                    <option value="教師">教師</option>
                    <option value="觀察者">觀察者</option>
                </select>
            </div>
        </div>

        <div class="progress-stepper">
            <div class="step active" data-step="1">1</div>
            <div class="step" data-step="2">2</div>
            <div class="step" data-step="3">3</div>
            <div class="step" data-step="4">4</div>
        </div>

        <div id="step1" class="question-card active">
            <h3>看見問題</h3>
            <p class="helper-text">💡 今天在外木山，你最想被大家正視的一個現象是什麼？</p>
            <textarea id="ans1" rows="4"></textarea>
        </div>
        <div id="step2" class="question-card">
            <h3>提煉價值</h3>
            <p class="helper-text">💡 如果把這個現象變成一堂課，你最希望學員學到什麼？</p>
            <textarea id="ans2" rows="4"></textarea>
        </div>
        <div id="step3" class="question-card">
            <h3>設計活動</h3>
            <p class="helper-text">💡 你會怎麼把它設計成一場有參與感的課？</p>
            <textarea id="ans3" rows="4"></textarea>
        </div>
        <div id="step4" class="question-card">
            <h3>評估可行性</h3>
            <p class="helper-text">💡 這堂課要真的在外木山辦，最需要先解決什麼？</p>
            <textarea id="ans4" rows="4"></textarea>
        </div>

        <div class="btn-group">
            <button class="btn-prev" onclick="changeStep(-1)" id="prevBtn" style="visibility: hidden;">上一步</button>
            <button class="btn-next" onclick="changeStep(1)" id="nextBtn">下一步</button>
            <button class="btn-submit" onclick="submitData()" id="submitBtn" style="display: none;">送出答案</button>
        </div>
    </section>

    <section class="wall-section">
        <h2>🌊 外木山靈感共創牆</h2>
        <div class="wall-grid" id="wallGrid"></div>
    </section>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDojQA5hs0LCdCilfqkTX-vDoo-c91Dc8A",
        authDomain: "my-realtime-demo.firebaseapp.com",
        databaseURL: "https://my-realtime-demo-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "my-realtime-demo",
        storageBucket: "my-realtime-demo.firebasestorage.app",
        messagingSenderId: "777385925855",
        appId: "1:777385925855:web:5d0e42f7e7581538491d6a",
        measurementId: "G-WK917TD06J"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const wallRef = ref(db, 'workshop_ideas');

    let currentStep = 1;
    const stageLabels = ["看見問題", "提煉價值", "設計活動", "評估可行性"];

    window.changeStep = function(n) {
        const newStep = currentStep + n;
        if (newStep < 1 || newStep > 4) return;
        document.getElementById(`step${currentStep}`).classList.remove('active');
        document.querySelector(`.step[data-step="${currentStep}"]`).classList.remove('active');
        currentStep = newStep;
        document.getElementById(`step${currentStep}`).classList.add('active');
        document.querySelector(`.step[data-step="${currentStep}"]`).classList.add('active');
        document.getElementById('prevBtn').style.visibility = (currentStep === 1) ? 'hidden' : 'visible';
        if (currentStep === 4) {
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('submitBtn').style.display = 'block';
        } else {
            document.getElementById('nextBtn').style.display = 'block';
            document.getElementById('submitBtn').style.display = 'none';
        }
    }

    window.submitData = function() {
        const group = document.getElementById('userGroup').value || "未分組";
        const name = document.getElementById('userName').value || "匿名島民";
        const role = document.getElementById('userRole').value;
        const content = document.getElementById(`ans${currentStep}`).value;

        if (!content.trim()) {
            alert("請輸入內容再送出喔！");
            return;
        }

        push(wallRef, {
            group, name, role,
            stage: stageLabels[currentStep-1],
            content,
            timestamp: Date.now()
        }).then(() => {
            document.getElementById(`ans${currentStep}`).value = "";
            alert("同步成功！");
        });
    }

    onChildAdded(wallRef, (data) => {
        const idea = data.val();
        const wallGrid = document.getElementById('wallGrid');
        const card = document.createElement('div');
        card.className = 'idea-card';
        card.innerHTML = `
            <div class="card-meta">
                <span><strong>${idea.group}</strong> · ${idea.name}</span>
                <span class="card-tag">${idea.stage}</span>
            </div>
            <div class="card-content">${idea.content}</div>
        `;
        wallGrid.insertBefore(card, wallGrid.firstChild);
    });
</script>
</body>
</html>
